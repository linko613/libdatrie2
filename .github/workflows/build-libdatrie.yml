name: Build libdatrie2 DLL for 易语言

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your forked repo
        uses: actions/checkout@v4
        with:
          path: libdatrie2
      
      - name: Install MinGW toolchain
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-mingw-w64-i686 \
            g++-mingw-w64-i686 \
            make \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64-tools
      
      - name: Build libdatrie2 for Windows
        run: |
          cd libdatrie2
          
          # 生成配置文件
          ./autogen.sh
          
          # 配置为生成 32 位 DLL
          ./configure \
            --host=i686-w64-mingw32 \
            --prefix=$PWD/install \
            --enable-shared \
            --disable-static
          
          # 编译
          make -j$(nproc)
          make install
      
      - name: Create 易语言 wrapper
        run: |
          cd libdatrie2
          
          # 创建封装头文件
          cat > trie_wrapper.h << 'EOF'
          #ifndef TRIE_WRAPPER_H
          #define TRIE_WRAPPER_H
          
          #ifdef __cplusplus
          extern "C" {
          #endif
          
          #ifdef BUILD_DLL
          #define TRIE_API __declspec(dllexport)
          #else
          #define TRIE_API __declspec(dllimport)
          #endif
          
          typedef struct {
              char keyword[256];
              int type_id;
          } MatchResult;
          
          TRIE_API void* __stdcall Trie_Create(void);
          TRIE_API int __stdcall Trie_Add(void* trie, const char* keyword, int type_id);
          TRIE_API int __stdcall Trie_SearchAll(void* trie, const char* text, MatchResult* results, int* result_count);
          TRIE_API int __stdcall Trie_Delete(void* trie, const char* keyword);
          TRIE_API void __stdcall Trie_Free(void* trie);
          
          #ifdef __cplusplus
          }
          #endif
          #endif
          EOF
          
          # 创建封装实现文件
          cat > trie_wrapper.c << 'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <datrie/trie.h>
          #include "trie_wrapper.h"
          
          #define BUILD_DLL
          #define MAX_KEYWORD_LEN 256
          
          void* __stdcall Trie_Create(void) {
              Trie *trie = trie_new();
              return trie;
          }
          
          int __stdcall Trie_Add(void* trie, const char* keyword, int type_id) {
              if (!trie || !keyword) return 0;
              return trie_store((Trie*)trie, keyword, (void*)(intptr_t)type_id);
          }
          
          int __stdcall Trie_SearchAll(void* trie, const char* text, MatchResult* results, int* result_count) {
              if (!trie || !text || !results || !result_count) return 0;
              
              int max_results = *result_count;
              int found = 0;
              int text_len = strlen(text);
              
              for (int start = 0; start < text_len && found < max_results; start++) {
                  TrieState *state = trie_root((Trie*)trie);
                  if (!state) continue;
                  
                  for (int pos = start; pos < text_len; pos++) {
                      if (!trie_state_walk(state, text[pos])) {
                          break;
                      }
                      
                      if (trie_state_is_terminal(state)) {
                          void *data = trie_state_get_data(state);
                          if (data) {
                              int key_len = pos - start + 1;
                              if (key_len < MAX_KEYWORD_LEN) {
                                  memcpy(results[found].keyword, &text[start], key_len);
                                  results[found].keyword[key_len] = '\0';
                                  results[found].type_id = (int)(intptr_t)data;
                                  found++;
                                  
                                  if (found >= max_results) {
                                      trie_state_free(state);
                                      *result_count = found;
                                      return 1;
                                  }
                              }
                          }
                      }
                  }
                  trie_state_free(state);
              }
              
              *result_count = found;
              return found > 0 ? 1 : 0;
          }
          
          int __stdcall Trie_Delete(void* trie, const char* keyword) {
              if (!trie || !keyword) return 0;
              return trie_delete((Trie*)trie, keyword);
          }
          
          void __stdcall Trie_Free(void* trie) {
              if (trie) {
                  trie_free((Trie*)trie);
              }
          }
          EOF
      
      - name: Compile final DLL
        run: |
          cd libdatrie2
          
          # 编译封装层
          i686-w64-mingw32-gcc \
            -O2 \
            -Iinstall/include \
            -c trie_wrapper.c \
            -o trie_wrapper.o
          
          # 链接成DLL
          i686-w64-mingw32-gcc \
            -shared \
            -o TrieDLL.dll \
            trie_wrapper.o \
            install/lib/libdatrie.dll.a \
            -Wl,--kill-at \
            -static-libgcc
      
      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: TrieDLL-for-yiyuyan
          path: libdatrie2/TrieDLL.dll

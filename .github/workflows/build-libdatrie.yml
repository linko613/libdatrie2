name: Build libdatrie 32-bit DLL for E

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install MinGW toolchain
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-mingw-w64-i686 \
            g++-mingw-w64-i686 \
            make \
            autoconf \
            automake \
            libtool \
            pkg-config
      
      - name: Download and patch libdatrie
        run: |
          git clone https://github.com/tlwg/libdatrie.git
          cd libdatrie
          
          # 添加易语言专用的导出头文件
          cat > datrie-yy.h << 'EOF'
          #ifndef DATRIE_YY_H
          #define DATRIE_YY_H
          
          #ifdef __cplusplus
          extern "C" {
          #endif
          
          /* 
           * 易语言专用导出函数
           * 使用 stdcall 调用约定
           */
          
          #ifdef BUILD_DLL
          #define YY_API __declspec(dllexport)
          #else
          #define YY_API __declspec(dllimport)
          #endif
          
          /* 创建Trie树 */
          YY_API void* __stdcall yy_trie_create(void);
          
          /* 插入关键词 */
          YY_API int __stdcall yy_trie_insert(void* trie, const char* key, int type_id);
          
          /* 搜索关键词 */
          YY_API int __stdcall yy_trie_search(void* trie, const char* text, char* matched_key, int* type_id);
          
          /* 删除关键词 */
          YY_API int __stdcall yy_trie_delete(void* trie, const char* key);
          
          /* 释放Trie树 */
          YY_API void __stdcall yy_trie_free(void* trie);
          
          #ifdef __cplusplus
          }
          #endif
          #endif
          EOF
          
          # 创建易语言封装源文件
          cat > datrie-yy.c << 'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <datrie/trie.h>
          #include "datrie-yy.h"
          
          #define BUILD_DLL
          
          /* 创建Trie树 */
          void* __stdcall yy_trie_create(void) {
              AlphaMap *amap = alpha_map_new();
              Trie *trie = trie_new(amap);
              alpha_map_free(amap);
              return trie;
          }
          
          /* 插入关键词 */
          int __stdcall yy_trie_insert(void* trie, const char* key, int type_id) {
              if (!trie || !key) return 0;
              
              /* 这里需要根据你的需求存储type_id
                 可以在trie中存储额外的数据 */
              return trie_store((Trie*)trie, (const AlphaChar*)key, strlen(key), (void*)(intptr_t)type_id);
          }
          
          /* 搜索关键词 */
          int __stdcall yy_trie_search(void* trie, const char* text, char* matched_key, int* type_id) {
              if (!trie || !text) return 0;
              
              /* 这里简化处理，实际需要遍历所有可能的匹配 */
              /* 返回1表示匹配成功 */
              return 0;
          }
          
          /* 删除关键词 */
          int __stdcall yy_trie_delete(void* trie, const char* key) {
              if (!trie || !key) return 0;
              return trie_delete((Trie*)trie, (const AlphaChar*)key, strlen(key));
          }
          
          /* 释放Trie树 */
          void __stdcall yy_trie_free(void* trie) {
              if (trie) {
                  trie_free((Trie*)trie);
              }
          }
          EOF
      
      - name: Build libdatrie DLL
        run: |
          cd libdatrie
          ./autogen.sh
          
          # 配置编译参数
          export CFLAGS="-O2 -DBUILD_DLL"
          export LDFLAGS="-static-libgcc"
          
          ./configure \
            --host=i686-w64-mingw32 \
            --prefix=$PWD/install \
            --enable-shared \
            --disable-static
          
          make -j$(nproc)
          make install
          
          # 编译易语言封装层
          i686-w64-mingw32-gcc \
            -O2 \
            -Iinstall/include \
            -I. \
            -c datrie-yy.c \
            -o datrie-yy.o
          
          # 链接成最终的DLL
          i686-w64-mingw32-gcc \
            -shared \
            -o libdatrie-yy.dll \
            datrie-yy.o \
            install/lib/libdatrie.dll.a \
            -Wl,--out-implib,libdatrie-yy.dll.a \
            -Wl,--kill-at  # 关键：这个选项处理 stdcall 名称修饰
      
      - name: Generate DEF file (for 易语言)
        run: |
          cd libdatrie
          cat > libdatrie-yy.def << 'EOF'
          LIBRARY libdatrie-yy.dll
          EXPORTS
          yy_trie_create
          yy_trie_insert
          yy_trie_search
          yy_trie_delete
          yy_trie_free
          EOF
          
          # 也可以用 pexports 生成完整DEF
          i686-w64-mingw32-pexports libdatrie-yy.dll > libdatrie-yy-full.def
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libdatrie-for-yy
          path: |
            libdatrie/libdatrie-yy.dll
            libdatrie/libdatrie-yy.def
            libdatrie/libdatrie-yy-full.def
            libdatrie/install/include/
          compression-level: 9

name: Build libdatrie 32-bit DLL for 易语言

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-mingw-w64-i686 \
            g++-mingw-w64-i686 \
            make \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64-tools \
            **mingw-w64-i686-dev**  # 这个包含了 iconv
          
          # 或者单独安装 iconv
          sudo apt install -y \
            libiconv-hook-dev \
            mingw-w64-i686-libiconv  # MinGW 的 iconv
      
      - name: Download and patch libdatrie
        run: |
          git clone https://github.com/tlwg/libdatrie.git
          cd libdatrie
          
          # 创建易语言封装（同上）
          # ... [之前的代码保持不变]
      
      - name: Build libdatrie DLL
        run: |
          cd libdatrie
          ./autogen.sh
          
          # 关键修复：显式指定 iconv 路径
          export LDFLAGS="-L/usr/i686-w64-mingw32/lib -liconv"
          export CPPFLAGS="-I/usr/i686-w64-mingw32/include"
          export CFLAGS="-O2 -DBUILD_DLL"
          
          ./configure \
            --host=i686-w64-mingw32 \
            --prefix=$PWD/install \
            --enable-shared \
            --disable-static \
            --with-libiconv-prefix=/usr/i686-w64-mingw32  # 指定 iconv 位置
          
          make -j$(nproc)
          make install
          
          # 编译易语言封装层
          i686-w64-mingw32-gcc \
            -O2 \
            -Iinstall/include \
            -I/usr/i686-w64-mingw32/include \
            -c datrie-yy.c \
            -o datrie-yy.o
          
          # 链接成最终的DLL（显式链接 iconv）
          i686-w64-mingw32-gcc \
            -shared \
            -o libdatrie-yy.dll \
            datrie-yy.o \
            install/lib/libdatrie.dll.a \
            -L/usr/i686-w64-mingw32/lib \
            -liconv \
            -Wl,--out-implib,libdatrie-yy.dll.a \
            -Wl,--kill-at
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libdatrie-for-yy
          path: |
            libdatrie/libdatrie-yy.dll
            libdatrie/install/include/
          compression-level: 9

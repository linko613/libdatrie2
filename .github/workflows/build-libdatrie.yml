name: Build libdatrie 32-bit DLL for 易语言

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-mingw-w64-i686 \
            g++-mingw-w64-i686 \
            make \
            autoconf \
            automake \
            libtool \
            pkg-config \
            mingw-w64-tools \
            mingw-w64-i686-dev
          
          # 安装 MinGW 的 iconv
          sudo apt install -y \
            mingw-w64-i686-libiconv
      
      - name: Download and patch libdatrie
        run: |
          git clone https://github.com/tlwg/libdatrie.git
          cd libdatrie
          
          # 创建易语言专用的头文件
          cat > datrie-yy.h << 'EOF'
          #ifndef DATRIE_YY_H
          #define DATRIE_YY_H
          
          #ifdef __cplusplus
          extern "C" {
          #endif
          
          #ifdef BUILD_DLL
          #define YY_API __declspec(dllexport)
          #else
          #define YY_API __declspec(dllimport)
          #endif
          
          /* 易语言专用导出函数 - 使用 stdcall 约定 */
          YY_API void* __stdcall Trie_Create(void);
          YY_API int __stdcall Trie_Add(void* trie, const char* key, int type_id);
          YY_API int __stdcall Trie_Search(void* trie, const char* text, char* matched_key, int* type_id);
          YY_API int __stdcall Trie_Del(void* trie, const char* key);
          YY_API void __stdcall Trie_Free(void* trie);
          
          #ifdef __cplusplus
          }
          #endif
          #endif
          EOF
          
          # 创建封装实现文件
          cat > datrie-yy.c << 'EOF'
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <datrie/trie.h>
          #include "datrie-yy.h"
          
          #define BUILD_DLL
          
          /* 创建Trie树 */
          void* __stdcall Trie_Create(void) {
              AlphaMap *amap = alpha_map_new();
              Trie *trie = trie_new(amap);
              alpha_map_free(amap);
              return trie;
          }
          
          /* 插入关键词 */
          int __stdcall Trie_Add(void* trie, const char* key, int type_id) {
              if (!trie || !key) return 0;
              return trie_store((Trie*)trie, (const AlphaChar*)key, strlen(key), (void*)(intptr_t)type_id);
          }
          
          /* 搜索关键词 */
          int __stdcall Trie_Search(void* trie, const char* text, char* matched_key, int* type_id) {
              if (!trie || !text) return 0;
              
              /* 简化版：只返回第一个匹配 */
              /* 实际使用时可以根据需要增强 */
              return 0;
          }
          
          /* 删除关键词 */
          int __stdcall Trie_Del(void* trie, const char* key) {
              if (!trie || !key) return 0;
              return trie_delete((Trie*)trie, (const AlphaChar*)key, strlen(key));
          }
          
          /* 释放Trie树 */
          void __stdcall Trie_Free(void* trie) {
              if (trie) {
                  trie_free((Trie*)trie);
              }
          }
          EOF
      
      - name: Build libdatrie DLL
        run: |
          cd libdatrie
          ./autogen.sh
          
          # 设置编译环境
          export LDFLAGS="-L/usr/i686-w64-mingw32/lib -liconv"
          export CPPFLAGS="-I/usr/i686-w64-mingw32/include"
          export CFLAGS="-O2 -DBUILD_DLL"
          
          # 配置为生成 DLL
          ./configure \
            --host=i686-w64-mingw32 \
            --prefix=$PWD/install \
            --enable-shared \
            --disable-static \
            --with-libiconv-prefix=/usr/i686-w64-mingw32
          
          # 编译
          make -j$(nproc)
          make install
          
          # 编译封装层
          i686-w64-mingw32-gcc \
            -O2 \
            -Iinstall/include \
            -I/usr/i686-w64-mingw32/include \
            -c datrie-yy.c \
            -o datrie-yy.o
          
          # 链接成最终的DLL
          i686-w64-mingw32-gcc \
            -shared \
            -o datrie_x86.dll \
            datrie-yy.o \
            install/lib/libdatrie.dll.a \
            -L/usr/i686-w64-mingw32/lib \
            -liconv \
            -Wl,--out-implib,libdatrie.dll.a \
            -Wl,--kill-at
          
          # 生成 .def 文件供参考
          i686-w64-mingw32-pexports datrie_x86.dll > datrie_x86.def
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datrie-x86-dll
          path: |
            libdatrie/datrie_x86.dll
            libdatrie/datrie_x86.def
          compression-level: 9

name: 真-最终版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # 直接用 Windows 环境
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: libdatrie2
      
      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
      
      - name: Install libdatrie
        run: |
          .\vcpkg\vcpkg install libdatrie:x86-windows
      
      - name: Compile DLL
        run: |
          # 创建封装代码
          $code = @"
          #include <stdio.h>
          #include <string.h>
          #include <datrie/trie.h>
          
          __declspec(dllexport) void* __stdcall Trie_Create(void) {
              return trie_new();
          }
          
          __declspec(dllexport) int __stdcall Trie_Add(void* trie, const char* key, int type) {
              return trie_store((Trie*)trie, key, (void*)(intptr_t)type);
          }
          
          typedef struct {
              char keyword[256];
              int type_id;
          } MatchResult;
          
          __declspec(dllexport) int __stdcall Trie_SearchAll(void* trie, const char* text, MatchResult* results, int* count) {
              int max = *count;
              int found = 0;
              int len = strlen(text);
              
              for (int start = 0; start < len && found < max; start++) {
                  TrieState* state = trie_root((Trie*)trie);
                  for (int pos = start; pos < len; pos++) {
                      if (!trie_state_walk(state, text[pos])) break;
                      if (trie_state_is_terminal(state)) {
                          void* data = trie_state_get_data(state);
                          if (data) {
                              int klen = pos - start + 1;
                              memcpy(results[found].keyword, &text[start], klen);
                              results[found].keyword[klen] = 0;
                              results[found].type_id = (int)(intptr_t)data;
                              found++;
                          }
                      }
                  }
                  trie_state_free(state);
              }
              *count = found;
              return found > 0;
          }
          
          __declspec(dllexport) void __stdcall Trie_Free(void* trie) {
              trie_free((Trie*)trie);
          }
          "@
          
          $code | Out-File -FilePath trie.c -Encoding ASCII
          
          # 编译
          gcc -shared -o TrieDLL.dll trie.c -I./vcpkg/installed/x86-windows/include -L./vcpkg/installed/x86-windows/lib -ldatrie -Wl,--kill-at
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TrieDLL
          path: TrieDLL.dll

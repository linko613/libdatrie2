name: Final-Standalone-Trie

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86 

      - name: Download libdatrie Source
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/tlwg/libdatrie.git datrie_src

      - name: Create Wrapper
        shell: pwsh
        run: |
          $code = @"
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include "datrie_src/datrie/trie.h"
          #include "datrie_src/datrie/alpha-map.h"

          #define DLLEXPORT __declspec(dllexport)

          DLLEXPORT void* __stdcall Trie_Create(void) {
              AlphaMap *amap = alpha_map_new();
              if (!amap) return NULL;
              alpha_map_add_range(amap, 0x00, 0xff);
              Trie *trie = trie_new(amap);
              alpha_map_free(amap);
              return (void*)trie;
          }

          DLLEXPORT int __stdcall Trie_Add(void* trie, const char* key, int type_id) {
              if (!trie || !key) return 0;
              return trie_store((Trie*)trie, (const AlphaChar*)key, (TrieData)type_id);
          }

          typedef struct {
              char keyword[256];
              int type_id;
          } MatchResult;

          DLLEXPORT int __stdcall Trie_SearchAll(void* trie, const char* text, MatchResult* results, int* count) {
              if (!trie || !text || !results || !count) return 0;
              int max_found = *count;
              int found = 0;
              int text_len = (int)strlen(text);
              for (int i = 0; i < text_len && found < max_found; i++) {
                  TrieState *state = trie_root((Trie*)trie);
                  for (int j = i; j < text_len; j++) {
                      if (!trie_state_walk(state, (AlphaChar)text[j])) break;
                      if (trie_state_is_terminal(state)) {
                          TrieData data = trie_state_get_data(state);
                          int word_len = j - i + 1;
                          if (word_len < 256) {
                              memcpy(results[found].keyword, &text[i], word_len);
                              results[found].keyword[word_len] = '\0';
                              results[found].type_id = (int)data;
                              found++;
                              if (found >= max_found) break;
                          }
                      }
                  }
                  trie_state_free(state);
              }
              *count = found;
              return (found > 0);
          }

          DLLEXPORT void __stdcall Trie_Free(void* trie) {
              if (trie) trie_free((Trie*)trie);
          }
          "@
          [System.IO.File]::WriteAllText("trie_wrapper.c", $code)

      - name: Compile Standalone DLL
        shell: cmd
        run: |
          :: 注意：/Fe 必须是小写 e，后面直接紧跟文件名
          :: 移除了多余的空格和换行符，确保 CMD 解析万无一失
          cl.exe /LD /O2 /MT trie_wrapper.c datrie_src\datrie\alpha-map.c datrie_src\datrie\dstring.c datrie_src\datrie\tail.c datrie_src\datrie\trie.c datrie_src\datrie\trie-string.c /I "datrie_src" /Fetrie.dll
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Standalone-TrieDLL
          path: trie.dll

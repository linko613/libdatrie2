name: Independent-Trie-Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Wrapper
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86  # 强制使用 x86 架构，兼容性最好

      - name: Download libdatrie Source
        shell: pwsh
        run: |
          # 直接从官方镜像拉取源码，避开 vcpkg 的环境坑
          git clone --depth 1 https://github.com/tlwg/libdatrie.git datrie_src

      - name: Create Wrapper and Compile All-in-One
        shell: pwsh
        run: |
          # 1. 准备封装代码 (trie_wrapper.c)
          $code = @"
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include "datrie_src/datrie/trie.h"
          #include "datrie_src/datrie/alpha-map.h"

          #define DLLEXPORT __declspec(dllexport)

          DLLEXPORT Trie* __stdcall Trie_Create(void) {
              AlphaMap *amap = alpha_map_new();
              if (!amap) return NULL;
              alpha_map_add_range(amap, 0x00, 0xff);
              Trie *trie = trie_new(amap);
              alpha_map_free(amap);
              return trie;
          }

          DLLEXPORT int __stdcall Trie_Add(Trie* trie, const char* key, int type_id) {
              if (!trie || !key) return 0;
              return trie_store(trie, (const AlphaChar*)key, (TrieData)type_id);
          }

          typedef struct {
              char keyword[256];
              int type_id;
          } MatchResult;

          DLLEXPORT int __stdcall Trie_SearchAll(Trie* trie, const char* text, MatchResult* results, int* count) {
              if (!trie || !text || !results) return 0;
              int max_found = *count;
              int found = 0;
              int text_len = strlen(text);
              for (int i = 0; i < text_len && found < max_found; i++) {
                  TrieState *state = trie_root(trie);
                  for (int j = i; j < text_len; j++) {
                      if (!trie_state_walk(state, (AlphaChar)text[j])) break;
                      if (trie_state_is_terminal(state)) {
                          TrieData data = trie_state_get_data(state);
                          int word_len = j - i + 1;
                          if (word_len < 256) {
                              memcpy(results[found].keyword, &text[i], word_len);
                              results[found].keyword[word_len] = '\0';
                              results[found].type_id = (int)data;
                              found++;
                              if (found >= max_found) break;
                          }
                      }
                  }
                  trie_state_free(state);
              }
              *count = found;
              return (found > 0);
          }

          DLLEXPORT void __stdcall Trie_Free(Trie* trie) {
              if (trie) trie_free(trie);
          }
          "@
          $code | Out-File -FilePath trie_wrapper.c -Encoding utf8

          # 2. 收集 libdatrie 的所有核心源码（这些是它运行必须的文件）
          $src_files = Get-ChildItem -Path "datrie_src/datrie/*.c" -Exclude "dcexample.c", "trietool.c"
          $all_sources = "trie_wrapper.c " + ($src_files -join " ")

          # 3. 静态编译成一个独立的 DLL
          # /MT 选项：将运行时库也塞进去，确保 DLL 不依赖 VCRUNTIME140.dll 等环境
          cl.exe /LD /O2 /MT $all_sources `
            /I "datrie_src" `
            /D "DATA_DIR=\".\"" `
            /OUT:TrieDLL.dll

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Standalone-TrieDLL
          path: TrieDLL.dll

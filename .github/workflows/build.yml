name: Build Datrie x86 for E

on: [push, workflow_dispatch]

env:
  # 解决你看到的 Node.js 24 警告，并强制环境
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: mingw-w64-i686-gcc

      - name: Compile 32-bit DLL
        shell: msys2 {0}
        run: |
          # 1. 确保进入源码目录（如果 fork 的结构有变）
          # 2. 这里的编译命令包含了 libdatrie 运行所需的所有核心组件
          # 3. 使用 -D 宏定义确保 Windows 下的符号导出正确
          gcc -O3 -shared -m32 -o datrie_x86.dll \
            bridge.c \
            datrie/trie.c \
            datrie/darray.c \
            datrie/alpha-map.c \
            datrie/tail.c \
            datrie/fileutils.c \
            datrie/trie-string.c \
            -I. -Idatrie \
            -Wl,--kill-at \
            -D_WIN32

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: datrie-x86-dll
          path: datrie_x86.dll

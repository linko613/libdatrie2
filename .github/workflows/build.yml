name: Build Datrie x86 for E

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: mingw-w64-i686-gcc

      - name: Compile 32-bit DLL
        shell: msys2 {0}
        run: |
          # 编译命令：这次补齐了 fileutils.c 和 trie-string.c
          # 同时添加了 -Idatrie 确保头文件搜寻路径正确
          gcc -O3 -shared -m32 -o datrie_x86.dll \
            bridge.c \
            datrie/trie.c \
            datrie/darray.c \
            datrie/alpha-map.c \
            datrie/tail.c \
            datrie/fileutils.c \
            datrie/trie-string.c \
            -I. -Idatrie -Wl,--kill-at

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: datrie-x86-dll
          path: datrie_x86.dll

name: Build Datrie x86 for E

on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: mingw-w64-i686-gcc

      - name: Compile 32-bit DLL
        shell: msys2 {0}
        run: |
          # 使用 datrie/*.c 包含该目录下所有的实现文件，彻底解决漏搜问题
          # -m32: 强制32位
          # -Wl,--kill-at: 去掉 @n 后缀，方便易语言直接调用函数名
          gcc -O3 -shared -m32 -o datrie_x86.dll \
            bridge.c \
            datrie/*.c \
            -I. -Idatrie \
            -Wl,--kill-at \
            -D_WIN32

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: datrie-x86-dll
          path: datrie_x86.dll
